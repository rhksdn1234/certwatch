apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: certwatch-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - certwatch.local
    secretName: certwatch-tls
  rules:
  - host: certwatch.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api
            port:
              number: 5000
