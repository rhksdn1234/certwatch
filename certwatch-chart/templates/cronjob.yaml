apiVersion: batch/v1
kind: CronJob
metadata:
  name: ssl-checker
spec:
  schedule: "0 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: checker
            image: python:3.11-slim
            command: ["/bin/sh", "-c"]
            args:
              - pip install psycopg2-binary && python /app/checker.py
            envFrom:
            - secretRef:
                name: postgres-secret
            volumeMounts:
            - name: code
              mountPath: /app
          volumes:
          - name: code
            configMap:
              name: checker-code

