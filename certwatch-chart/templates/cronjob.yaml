apiVersion: batch/v1
kind: CronJob
metadata:
  name: ssl-checker
spec:
  schedule: "{{ .Values.cronjob.schedule }}"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: checker
            image: {{ .Values.api.image }}
            command: ["/bin/sh", "-c"]
            args:
              - pip install psycopg2-binary && python /app/checker.py
            envFrom:
            - secretRef:
                name: {{ .Values.secretName }}
            volumeMounts:
            - name: code
              mountPath: /app
          volumes:
          - name: code
            configMap:
              name: {{ .Values.checkerCodeConfigMap }}
