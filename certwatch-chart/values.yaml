# CertWatch 차트 설정값

api:
  replicas: 1
  image: python:3.11-slim
  port: 5000

postgres:
  image: postgres:16
  storage: 1Gi

ingress:
  host: certwatch.local
  tlsSecret: certwatch-tls

cronjob:
  schedule: "0 * * * *"

# 차트 밖에서 관리하는 리소스 이름들 (참조용)
secretName: postgres-secret
codeConfigMap: api-code
checkerCodeConfigMap: checker-code
